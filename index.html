<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반부패 법령 중급 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 환경 변수 설정
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB98UvE1F_Sg01rwExrAAdlWnjMlZavJf4",
            authDomain: "ggbb-19b7d.firebaseapp.com",
            projectId: "ggbb-19b7d",
            storageBucket: "ggbb-19b7d.firebasestorage.app",
            messagingSenderId: "254782326022",
            appId: "1:254782326022:web:3c94761b55a7cd17fe0a87"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anti-corruption-pro-2026';

        // 퀴즈 데이터
        const questions = [
            {
                cat: "청탁금지법",
                q: "청탁금지법상 '외부강의등'의 사례금 수수 제한에 관한 설명으로 옳은 것은? (2024년 이후 개정 기준)",
                opts: [
                    "국가기관 소속 공무원이 직무와 관련하여 강의를 할 경우 사례금을 받을 수 없다.",
                    "사례금 상한액을 초과하여 받은 경우, 받은 날로부터 7일 이내에 소속기관장에게 신고해야 한다.",
                    "사례금을 받는 외부강의를 할 때는 마친 날부터 5일 이내에 신고해야 한다.",
                    "초과사례금을 신고하고 반환하지 않은 경우 1,000만원 이하의 과태료가 부과된다.",
                    "언론인이나 사립학교 교직원의 외부강의 사례금 상한액은 시간당 100만원이다."
                ],
                ans: 0,
                exp: "국가공무원법 등에 따른 공무원은 직무와 관련하여 국가기관에서 강의를 할 경우 사례금 수수가 금지됩니다. (참고: 신고 기한은 마친 날부터 10일 이내입니다.)"
            },
            {
                cat: "이해충돌방지법",
                q: "이해충돌방지법상 '공공기관 직무 관련 부동산 보유·매수 신고' 의무에 대한 설명으로 틀린 것은?",
                opts: [
                    "부동산 업무 수행 공직자는 본인뿐만 아니라 배우자의 부동산 보유 사실도 신고해야 한다.",
                    "신고 대상은 부동산 개발 업무를 수행하는 공공기관의 공직자에게 주로 적용된다.",
                    "부동산을 보유하고 있다는 사실을 안 날로부터 14일 이내에 서면으로 신고해야 한다.",
                    "부동산을 매수한 경우에는 매수 후 30일 이내에 신고해야 한다.",
                    "주택법에 따른 매매 계약 체결 등 소유권 이전등기 전이라도 신고 의무가 발생한다."
                ],
                ans: 3,
                exp: "부동산 매수 신고는 매수 후가 아니라, '매매계약 체결 등 사실을 안 날'로부터 14일 이내에 신고해야 합니다."
            },
            {
                cat: "공공재정환수법",
                q: "공공재정환수법상 제재부가금을 부과하지 아니할 수 있는 예외 사유에 해당하지 않는 것은?",
                opts: [
                    "부정이익이 100만원 이하인 경우",
                    "기초생활수급자 등 사회적 취약계층의 생계에 지장을 줄 우려가 있는 경우",
                    "공공재정지급금을 지급한 기관의 착오로 부당이익이 발생한 경우",
                    "부정청구자가 사망하거나 법인이 해산하여 제재부가금을 징수할 수 없는 경우",
                    "부정청구자가 해당 부정이익을 자진하여 신고하고 환수한 경우"
                ],
                ans: 0,
                exp: "제재부가금 면제 기준액은 부정이익이 '10만원 이하'인 경우입니다. 100만원은 면제 대상이 아닙니다."
            },
            {
                cat: "행동강령",
                q: "공무원 행동강령상 '가족 채용 제한'에 대한 설명 중 옳은 것은?",
                opts: [
                    "고위공직자는 소속 공공기관의 자회사에 자신의 가족이 채용되도록 지시할 수 없다.",
                    "인사 업무 담당 공무원은 자신이 소속된 기관에 가족이 채용되도록 영향력을 행사해서는 안 된다.",
                    "다수인을 대상으로 하는 공개경쟁채용시험을 통해 가족이 채용되는 것은 허용된다.",
                    "가족의 범위에는 민법상 가족뿐만 아니라 생계를 같이하는 배우자의 부모도 포함된다.",
                    "위의 설명은 모두 옳다."
                ],
                ans: 4,
                exp: "행동강령은 가족 채용에 대한 엄격한 제한을 두고 있으나, 공정한 공개경쟁채용 과정을 통한 채용은 예외로 인정합니다."
            },
            {
                cat: "부패방지법",
                q: "부패방지권익위법상 비위면직자등의 취업제한 위반 시 처벌 수위로 옳은 것은?",
                opts: [
                    "1년 이하의 징역 또는 1천만원 이하의 벌금",
                    "2년 이하의 징역 또는 2천만원 이하의 벌금",
                    "3년 이하의 징역 또는 3천만원 이하의 벌금",
                    "5년 이하의 징역 또는 5천만원 이하의 벌금",
                    "과태료 3천만원 부과"
                ],
                ans: 1,
                exp: "비위면직자가 취업제한 규정을 위반하여 취업한 경우 2년 이하의 징역 또는 2천만원 이하의 벌금에 처해집니다."
            },
            {
                cat: "청탁금지법",
                q: "공직자등에게 허용되는 '원활한 직무수행, 사교·의례' 목적의 선물 가액 한도로 틀린 것은?",
                opts: [
                    "농수산물 및 농수산가공품 선물은 평상시 15만원까지 가능하다.",
                    "물품 상품권(커피 기프티콘 등)은 5만원 한도 내에서 선물 가능하다.",
                    "백화점 상품권 등 금액 상품권은 직무관련자로부터 원칙적으로 수수할 수 없다.",
                    "추석·설 명절 기간(24일 전~후 5일) 농수산물 선물은 30만원까지 상향된다.",
                    "음식물(식사비)과 선물을 함께 받는 경우 합산하여 5만원 이하여야 한다."
                ],
                ans: 4,
                exp: "음식물(5만원)과 일반선물(5만원)을 함께 받는 경우 합산 5만원이 기준이지만, 농수산물 선물(15만원)과 함께 받는 경우 합산 15만원(단, 각 항목의 한도는 준수)까지 가능합니다."
            },
            {
                cat: "이해충돌방지법",
                q: "이해충돌방지법상 '사적 이해관계자'의 범위에 직접적으로 포함되지 않는 자는?",
                opts: [
                    "공직자 자신 또는 그 가족",
                    "공직자 채용 시 직접적인 임용권자였던 자",
                    "최근 2년 이내 퇴직한 공직자로서 퇴직 전 2년간 같은 부서에서 근무했던 자",
                    "공직자가 지분 30%를 보유한 특수관계법인",
                    "공직자의 배우자와 생계를 같이하지 않는 배우자의 형제자매"
                ],
                ans: 1,
                exp: "임용권자였다는 사실만으로는 사적 이해관계자에 포함되지 않습니다. 법은 주로 퇴직자, 가족, 법인 등 실질적 이해관계 위주로 정의합니다."
            },
            {
                cat: "행동강령",
                q: "공무원이 자신의 직무와 관련하여 직무관련 공무원으로부터 금전을 빌리는 행위에 대한 설명으로 옳은 것은?",
                opts: [
                    "무이자로 빌리는 경우에만 신고 대상이다.",
                    "친족(8촌 이내 혈족)으로부터 빌리는 경우에도 반드시 소속기관장에게 신고해야 한다.",
                    "금융기관으로부터 대출을 받는 행위는 신고 대상이 아니다.",
                    "차용증을 쓰고 시장 이자율을 지급한다면 신고할 필요가 없다.",
                    "사전 신고가 원칙이며, 부득이한 경우 마친 날부터 10일 이내에 신고해야 한다."
                ],
                ans: 2,
                exp: "금융기관 대출이나 친족으로부터 차용하는 경우는 신고 예외 사유에 해당합니다."
            },
            {
                cat: "공공재정환수법",
                q: "공공재정 부정청구 유형 중 '목적외 사용'에 해당하는 제재부가금 배수는?",
                opts: [
                    "부정이익의 1배",
                    "부정이익의 2배",
                    "부정이익의 3배",
                    "부정이익의 5배",
                    "제재부가금을 부과하지 않음"
                ],
                ans: 1,
                exp: "허위청구는 5배, 과다청구는 3배, 목적외 사용은 2배의 제재부가금이 부과됩니다."
            },
            {
                cat: "부패방지법",
                q: "국민감사청구제도에 대한 설명 중 틀린 것은?",
                opts: [
                    "18세 이상의 국민은 공공기관의 사무처리가 법령위반 등으로 공익을 해치는 경우 청구할 수 있다.",
                    "국민감사청구심의위원회의 결정에 따라 감사를 실시한다.",
                    "청구 대상 기관에는 국회, 법원, 헌법재판소도 포함된다.",
                    "300명 이상의 국민 연서가 필요하다.",
                    "동일한 사안에 대해 감사원이 이미 감사를 실시한 경우 청구 대상에서 제외된다."
                ],
                ans: 2,
                exp: "국가기관 중 국회, 법원, 헌법재판소, 선거관리위원회 또는 지방의회의 사무에 대하여는 별도의 청구 절차(국회감사청구 등)가 규정되어 있어 부패방지권익위법상 국민감사청구 대상에서는 제외됩니다."
            }
        ];

        window.state = {
            user: null,
            userName: "",
            score: 0,
            currentIndex: 0,
            isAdmin: false,
            allScores: []
        };

        // 인증 초기화 로직 보완
        async function initAuth() {
            onAuthStateChanged(auth, (user) => {
                window.state.user = user;
                if (user) {
                    console.log("Authenticated:", user.uid);
                    loadData();
                }
            });

            try {
                // 1순위: 시스템 제공 토큰 사용
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    // 2순위: 익명 로그인 시도
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error.message);
                // 인증 실패 시에도 퀴즈는 진행할 수 있도록 알림만 표시
                if (error.code === 'auth/configuration-not-found') {
                    console.warn("Firebase 콘솔에서 익명 로그인을 활성화해야 기록 저장이 가능합니다.");
                }
            }
        }

        function loadData() {
            if (!window.state.user) return;
            const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results');
            onSnapshot(resultsRef, (snapshot) => {
                window.state.allScores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => (b.ts?.seconds || 0) - (a.ts?.seconds || 0));
                if (window.state.isAdmin) renderAdminTable();
            }, (err) => {
                console.warn("Firestore access restricted:", err.message);
            });
        }

        window.startQuiz = () => {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return alert("성함을 입력해주세요.");
            window.state.userName = name;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        function renderQuestion() {
            const q = questions[window.state.currentIndex];
            document.getElementById('progress-bar').style.width = `${((window.state.currentIndex + 1) / questions.length) * 100}%`;
            document.getElementById('q-category').innerText = q.cat;
            document.getElementById('q-title').innerText = `${window.state.currentIndex + 1}. ${q.q}`;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 mb-3 border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all font-medium flex gap-3 items-start group";
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-xs text-slate-500 group-hover:bg-blue-500 group-hover:text-white">${idx + 1}</span>
                    <span class="flex-1">${opt}</span>
                `;
                btn.onclick = () => handleAnswer(idx);
                optionsDiv.appendChild(btn);
            });
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function handleAnswer(selectedIdx) {
            const q = questions[window.state.currentIndex];
            const isCorrect = selectedIdx === q.ans;
            const btns = document.getElementById('options-container').querySelectorAll('button');
            
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.ans) {
                    btn.classList.add('border-green-500', 'bg-green-50');
                } else if (idx === selectedIdx && !isCorrect) {
                    btn.classList.add('border-red-500', 'bg-red-50');
                }
            });

            if (isCorrect) window.state.score += 10;
            
            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        window.nextStep = async () => {
            if (window.state.currentIndex < questions.length - 1) {
                window.state.currentIndex++;
                renderQuestion();
            } else {
                await finishQuiz();
            }
        };

        async function finishQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = window.state.score;
            
            if (window.state.user) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results'), {
                        name: window.state.userName,
                        score: window.state.score,
                        ts: serverTimestamp(),
                        uid: window.state.user.uid
                    });
                } catch (e) {
                    console.error("Save Error:", e);
                }
            } else {
                console.warn("결과가 저장되지 않았습니다. (인증 필요)");
            }
        }

        window.toggleAdmin = () => {
            const pw = prompt("관리자 인증번호를 입력하세요.");
            if (pw === "2022284") {
                window.state.isAdmin = true;
                document.getElementById('admin-section').classList.remove('hidden');
                renderAdminTable();
            } else {
                alert("인증번호가 틀렸습니다.");
            }
        };

        function renderAdminTable() {
            const tbody = document.getElementById('admin-body');
            tbody.innerHTML = window.state.allScores.map((s, i) => `
                <tr class="border-b">
                    <td class="p-3 text-center text-xs text-slate-500">${window.state.allScores.length - i}</td>
                    <td class="p-3 font-bold">${s.name}</td>
                    <td class="p-3 text-blue-600 font-black">${s.score}점</td>
                    <td class="p-3 text-xs text-slate-400">${s.ts ? new Date(s.ts.seconds * 1000).toLocaleString() : '-'}</td>
                    <td class="p-3">
                        <button onclick="deleteRow('${s.id}')" class="text-red-500 text-xs">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        window.deleteRow = async (id) => {
            if (confirm("삭제하시겠습니까?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quiz_results', id));
                } catch (e) {
                    console.error("Delete Error:", e);
                }
            }
        };

        window.downloadExcel = () => {
            if (window.state.allScores.length === 0) return alert("데이터가 없습니다.");
            const data = window.state.allScores.map(s => ({
                이름: s.name,
                점수: s.score,
                일시: s.ts ? new Date(s.ts.seconds * 1000).toLocaleString() : '-'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, "반부패퀴즈_성적표.xlsx");
        };

        window.onload = initAuth;
    </script>
