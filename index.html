<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반부패 법령 중급 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (환경 변수 우선 사용)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyB98UvE1F_Sg01rwExrAAdlWnjMlZavJf4",
            authDomain: "ggbb-19b7d.firebaseapp.com",
            projectId: "ggbb-19b7d",
            storageBucket: "ggbb-19b7d.firebasestorage.app",
            messagingSenderId: "254782326022",
            appId: "1:254782326022:web:3c94761b55a7cd17fe0a87"
            measurementId: "G-PKWDS2D9ZQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anti-corruption-pro-2026';

        // 퀴즈 데이터 정의
        const questions = [
            {
                cat: "청탁금지법",
                q: "청탁금지법상 '외부강의등'의 사례금 수수 제한에 관한 설명으로 옳은 것은? (2024년 이후 개정 기준)",
                opts: [
                    "국가기관 소속 공무원이 직무와 관련하여 강의를 할 경우 사례금을 받을 수 없다.",
                    "사례금 상한액을 초과하여 받은 경우, 받은 날로부터 7일 이내에 소속기관장에게 신고해야 한다.",
                    "사례금을 받는 외부강의를 할 때는 마친 날부터 5일 이내에 신고해야 한다.",
                    "초과사례금을 신고하고 반환하지 않은 경우 1,000만원 이하의 과태료가 부과된다.",
                    "언론인이나 사립학교 교직원의 외부강의 사례금 상한액은 시간당 100만원이다."
                ],
                ans: 0,
                exp: "국가공무원법 등에 따른 공무원은 직무와 관련하여 국가기관에서 강의를 할 경우 사례금 수수가 금지됩니다."
            },
            {
                cat: "이해충돌방지법",
                q: "이해충돌방지법상 '공공기관 직무 관련 부동산 보유·매수 신고' 의무에 대한 설명으로 틀린 것은?",
                opts: [
                    "부동산 업무 수행 공직자는 본인뿐만 아니라 배우자의 부동산 보유 사실도 신고해야 한다.",
                    "신고 대상은 부동산 개발 업무를 수행하는 공공기관의 공직자에게 주로 적용된다.",
                    "부동산을 보유하고 있다는 사실을 안 날로부터 14일 이내에 서면으로 신고해야 한다.",
                    "부동산을 매수한 경우에는 매수 후 30일 이내에 신고해야 한다.",
                    "주택법에 따른 매매 계약 체결 등 소유권 이전등기 전이라도 신고 의무가 발생한다."
                ],
                ans: 3,
                exp: "부동산 매수 신고는 매수 후가 아니라, '매매계약 체결 등 사실을 안 날'로부터 14일 이내에 신고해야 합니다."
            },
            {
                cat: "공공재정환수법",
                q: "공공재정환수법상 제재부가금을 부과하지 아니할 수 있는 예외 사유에 해당하지 않는 것은?",
                opts: [
                    "부정이익이 100만원 이하인 경우",
                    "기초생활수급자 등 사회적 취약계층의 생계에 지장을 줄 우려가 있는 경우",
                    "공공재정지급금을 지급한 기관의 착오로 부당이익이 발생한 경우",
                    "부정청구자가 사망하거나 법인이 해산하여 제재부가금을 징수할 수 없는 경우",
                    "부정청구자가 해당 부정이익을 자진하여 신고하고 환수한 경우"
                ],
                ans: 0,
                exp: "제재부가금 면제 기준액은 부정이익이 '10만원 이하'인 경우입니다."
            },
            {
                cat: "행동강령",
                q: "공무원 행동강령상 '가족 채용 제한'에 대한 설명 중 옳은 것은?",
                opts: [
                    "고위공직자는 소속 공공기관의 자회사에 자신의 가족이 채용되도록 지시할 수 없다.",
                    "인사 업무 담당 공무원은 자신이 소속된 기관에 가족이 채용되도록 영향력을 행사해서는 안 된다.",
                    "다수인을 대상으로 하는 공개경쟁채용시험을 통해 가족이 채용되는 것은 허용된다.",
                    "가족의 범위에는 민법상 가족뿐만 아니라 생계를 같이하는 배우자의 부모도 포함된다.",
                    "위의 설명은 모두 옳다."
                ],
                ans: 4,
                exp: "행동강령은 공정한 공개경쟁채용 과정을 통한 채용은 예외로 인정합니다."
            },
            {
                cat: "부패방지법",
                q: "부패방지권익위법상 비위면직자등의 취업제한 위반 시 처벌 수위로 옳은 것은?",
                opts: [
                    "1년 이하의 징역 또는 1천만원 이하의 벌금",
                    "2년 이하의 징역 또는 2천만원 이하의 벌금",
                    "3년 이하의 징역 또는 3천만원 이하의 벌금",
                    "5년 이하의 징역 또는 5천만원 이하의 벌금",
                    "과태료 3천만원 부과"
                ],
                ans: 1,
                exp: "비위면직자가 규정을 위반하여 취업한 경우 2년 이하의 징역 또는 2천만원 이하의 벌금에 처해집니다."
            }
        ];

        window.state = {
            user: null,
            userName: "",
            score: 0,
            currentIndex: 0,
            isAdmin: false,
            allScores: [],
            unsubscribe: null
        };

        // 인증 초기화
        async function initAuth() {
            onAuthStateChanged(auth, (user) => {
                window.state.user = user;
                if (user) {
                    console.log("Auth Success:", user.uid);
                    // 인증이 완료된 후 데이터 로드 시작
                    loadData();
                }
            });

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Failure:", error.code, error.message);
                // 익명 로그인 실패 시에도 앱은 동작하도록 유지 (저장만 안됨)
            }
        }

        // 데이터 로드 함수 (실시간 리스너)
        function loadData() {
            if (!window.state.user) return;
            
            // 기존 리스너가 있다면 제거
            if (window.state.unsubscribe) window.state.unsubscribe();

            // 데이터 경로 준수: /artifacts/{appId}/public/data/{collectionName}
            const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results');
            
            window.state.unsubscribe = onSnapshot(resultsRef, (snapshot) => {
                window.state.allScores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => {
                        const timeA = a.ts?.seconds || 0;
                        const timeB = b.ts?.seconds || 0;
                        return timeB - timeA;
                    });
                
                console.log("Data Loaded:", window.state.allScores.length, "items");
                
                if (window.state.isAdmin) {
                    renderAdminTable();
                }
            }, (error) => {
                console.error("Firestore Load Error:", error);
            });
        }

        window.startQuiz = () => {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return alert("성함을 입력해주세요.");
            window.state.userName = name;
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            renderQuestion();
        };

        function renderQuestion() {
            const q = questions[window.state.currentIndex];
            document.getElementById('progress-bar').style.width = `${((window.state.currentIndex + 1) / questions.length) * 100}%`;
            document.getElementById('q-category').innerText = q.cat;
            document.getElementById('q-title').innerText = `${window.state.currentIndex + 1}. ${q.q}`;
            
            const optionsDiv = document.getElementById('options-container');
            optionsDiv.innerHTML = '';
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 mb-3 border-2 border-slate-200 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all font-medium flex gap-3 items-start group";
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-6 h-6 rounded-full bg-slate-100 flex items-center justify-center text-xs text-slate-500 group-hover:bg-blue-500 group-hover:text-white">${idx + 1}</span>
                    <span class="flex-1">${opt}</span>
                `;
                btn.onclick = () => handleAnswer(idx);
                optionsDiv.appendChild(btn);
            });
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function handleAnswer(selectedIdx) {
            const q = questions[window.state.currentIndex];
            const isCorrect = selectedIdx === q.ans;
            const btns = document.getElementById('options-container').querySelectorAll('button');
            
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.ans) {
                    btn.classList.add('border-green-500', 'bg-green-50');
                } else if (idx === selectedIdx && !isCorrect) {
                    btn.classList.add('border-red-500', 'bg-red-50');
                }
            });

            if (isCorrect) window.state.score += 20; // 5문제 기준 20점씩
            
            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        window.nextStep = async () => {
            if (window.state.currentIndex < questions.length - 1) {
                window.state.currentIndex++;
                renderQuestion();
            } else {
                await finishQuiz();
            }
        };

        async function finishQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = window.state.score;
            
            if (window.state.user) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'quiz_results'), {
                        name: window.state.userName,
                        score: window.state.score,
                        ts: serverTimestamp(),
                        uid: window.state.user.uid
                    });
                } catch (e) {
                    console.error("Save Error:", e);
                }
            }
        }

        window.toggleAdmin = () => {
            const pw = prompt("관리자 인증번호를 입력하세요.");
            if (pw === "2022284") {
                window.state.isAdmin = true;
                document.getElementById('admin-section').classList.remove('hidden');
                // 관리자 전환 시 데이터 즉시 새로고침
                loadData();
                renderAdminTable();
            } else {
                alert("인증번호가 틀렸습니다.");
            }
        };

        function renderAdminTable() {
            const tbody = document.getElementById('admin-body');
            if (window.state.allScores.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-400">등록된 성적이 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = window.state.allScores.map((s, i) => `
                <tr class="border-b hover:bg-slate-50">
                    <td class="p-3 text-center text-xs text-slate-500">${window.state.allScores.length - i}</td>
                    <td class="p-3 font-bold text-slate-700">${s.name || '무명'}</td>
                    <td class="p-3 text-blue-600 font-black">${s.score}점</td>
                    <td class="p-3 text-xs text-slate-400">${s.ts ? new Date(s.ts.seconds * 1000).toLocaleString() : '방금 전'}</td>
                    <td class="p-3 text-right">
                        <button onclick="deleteRow('${s.id}')" class="text-red-400 hover:text-red-600 text-xs px-2 py-1">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        window.deleteRow = async (id) => {
            if (!window.state.user) return;
            if (confirm("해당 기록을 삭제하시겠습니까?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'quiz_results', id));
                } catch (e) {
                    console.error("Delete Error:", e);
                }
            }
        };

        window.downloadExcel = () => {
            if (window.state.allScores.length === 0) return alert("데이터가 없습니다.");
            const data = window.state.allScores.map(s => ({
                이름: s.name,
                점수: s.score,
                일시: s.ts ? new Date(s.ts.seconds * 1000).toLocaleString() : '-'
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "성적표");
            XLSX.writeFile(wb, `반부패퀴즈_결과_${new Date().toLocaleDateString()}.xlsx`);
        };

        window.onload = initAuth;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f8fafc; color: #1e293b; -webkit-font-smoothing: antialiased; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header -->
    <header class="w-full max-w-2xl mt-8 mb-6 flex justify-between items-center px-2">
        <div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">반부패 실무 마스터 <span class="text-blue-600">PRO</span></h1>
            <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Anti-Corruption Advanced Quiz</p>
        </div>
        <button onclick="toggleAdmin()" class="w-10 h-10 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-slate-800 hover:text-white transition-all shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </button>
    </header>

    <!-- Main Card -->
    <main class="w-full max-w-2xl card p-8 mb-8">
        
        <!-- Welcome Screen -->
        <section id="welcome-screen" class="text-center py-12">
            <div class="mb-8 inline-block p-4 bg-blue-50 rounded-3xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" class="text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">실무자를 위한 법령 테스트</h2>
            <p class="text-slate-500 mb-10 leading-relaxed text-sm">청탁금지법, 이해충돌방지법 등 5대 법령의<br>실무 사례 중심 퀴즈에 도전하세요.</p>
            
            <div class="max-w-sm mx-auto">
                <input type="text" id="name-input" placeholder="성함을 입력하세요" class="w-full p-4 bg-slate-100 rounded-xl mb-4 text-center font-bold text-lg outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button onclick="startQuiz()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-black text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">테스트 시작</button>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="hidden">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-2">
                    <span id="q-category" class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full uppercase">CATEGORY</span>
                    <span class="text-xs font-bold text-slate-400">PROGRESS</span>
                </div>
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <h3 id="q-title" class="text-xl font-bold text-slate-800 mb-8 leading-tight min-h-[4rem]">질문을 불러오는 중...</h3>
            
            <div id="options-container" class="mb-8"></div>

            <div id="explanation-box" class="hidden mb-8 p-5 bg-slate-50 border-l-4 border-blue-500 rounded-r-xl">
                <h4 class="text-blue-600 font-black text-xs mb-2 uppercase tracking-tighter">정답 및 해설</h4>
                <p id="exp-text" class="text-sm text-slate-600 leading-relaxed font-medium"></p>
            </div>

            <button id="next-btn" onclick="nextStep()" class="hidden w-full bg-slate-800 text-white p-5 rounded-xl font-black text-lg hover:bg-black transition-all">다음 단계로</button>
        </section>

        <!-- Result Screen -->
        <section id="result-screen" class="hidden text-center py-8">
            <div class="text-6xl font-black text-blue-600 mb-4 tracking-tighter" id="final-score">0</div>
            <p class="text-xl font-bold text-slate-800 mb-2">테스트 완료!</p>
            <p class="text-slate-500 mb-12 text-sm">성적이 성공적으로 기록되었습니다.</p>
            
            <button onclick="location.reload()" class="bg-slate-100 text-slate-600 px-10 py-4 rounded-xl font-bold hover:bg-slate-200 transition-all">메인으로</button>
        </section>
    </main>

    <!-- Admin Section -->
    <section id="admin-section" class="w-full max-w-2xl card p-8 mb-12 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></span>
                실시간 응시 현황
            </h2>
            <button onclick="downloadExcel()" class="text-sm font-bold text-blue-600 flex items-center gap-1 hover:underline">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                엑셀 추출
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50 border-y border-slate-100">
                    <tr class="text-[10px] text-slate-400 font-black uppercase tracking-widest">
                        <th class="p-4 text-center w-12">NO</th>
