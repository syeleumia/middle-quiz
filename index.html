<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026년 경기북부지사 반부패법령 초급 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 가이드:
        // 1. Firebase 콘솔(https://console.firebase.google.com/) 접속
        // 2. 프로젝트 생성 후 '웹 앱' 추가
        // 3. 발급받은 구성 객체(firebaseConfig)를 아래에 붙여넣으세요.
        let firebaseConfig;
        try {
            // 로컬 실행 환경용 (Canvas 내부 실행용)
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            // 깃허브 배포 등 외부 환경에서 실행할 때 사용하는 설정값입니다.
            // 아래 주석을 해제하고 실제 Firebase 콘솔에서 복사한 값을 입력하세요.
            firebaseConfig = {
                 apiKey: "AIzaSyDfUie9k9_OKW0nWEiRcBURntUtSwH0-Ig",
  authDomain: "ggbb2026-3b839.firebaseapp.com",
  projectId: "ggbb2026-3b839",
  storageBucket: "ggbb2026-3b839.firebasestorage.app",
  messagingSenderId: "1067271302590",
  appId: "1:1067271302590:web:6365137fd86a7867159def"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'korea-north-quiz-2026';

        window.state = {
            user: null,
            userName: "",
            score: 0,
            currentIndex: 0,
            isAdmin: false,
            leaderboard: []
        };

        const questions = [
            {   cat: "청탁금지법",
                q: "청탁금지법상 '외부강의등'의 사례금 수수 제한에 관한 설명으로 옳은 것은? (2024년 이후 개정 기준)",
                opts: [
                    "국가기관 소속 공무원이 직무와 관련하여 강의를 할 경우 사례금을 받을 수 없다.",
                    "사례금 상한액을 초과하여 받은 경우, 받은 날로부터 7일 이내에 소속기관장에게 신고해야 한다.",
                    "사례금을 받는 외부강의를 할 때는 마친 날부터 5일 이내에 신고해야 한다.",
                    "초과사례금을 신고하고 반환하지 않은 경우 1,000만원 이하의 과태료가 부과된다.",
                    "언론인이나 사립학교 교직원의 외부강의 사례금 상한액은 시간당 100만원이다."
                ],
                ans: 0,
                exp: "국가공무원법 등에 따른 공무원은 직무와 관련하여 국가기관에서 강의를 할 경우 사례금 수수가 금지됩니다."
            },
            {
                cat: "이해충돌방지법",
                q: "이해충돌방지법상 '공공기관 직무 관련 부동산 보유·매수 신고' 의무에 대한 설명으로 틀린 것은?",
                opts: [
                    "부동산 업무 수행 공직자는 본인뿐만 아니라 배우자의 부동산 보유 사실도 신고해야 한다.",
                    "신고 대상은 부동산 개발 업무를 수행하는 공공기관의 공직자에게 주로 적용된다.",
                    "부동산을 보유하고 있다는 사실을 안 날로부터 14일 이내에 서면으로 신고해야 한다.",
                    "부동산을 매수한 경우에는 매수 후 30일 이내에 신고해야 한다.",
                    "주택법에 따른 매매 계약 체결 등 소유권 이전등기 전이라도 신고 의무가 발생한다."
                ],
                ans: 3,
                exp: "부동산 매수 신고는 매수 후가 아니라, '매매계약 체결 등 사실을 안 날'로부터 14일 이내에 신고해야 합니다."
            },
            {
                cat: "공공재정환수법",
                q: "공공재정환수법상 제재부가금을 부과하지 아니할 수 있는 예외 사유에 해당하지 않는 것은?",
                opts: [
                    "부정이익이 100만원 이하인 경우",
                    "기초생활수급자 등 사회적 취약계층의 생계에 지장을 줄 우려가 있는 경우",
                    "공공재정지급금을 지급한 기관의 착오로 부당이익이 발생한 경우",
                    "부정청구자가 사망하거나 법인이 해산하여 제재부가금을 징수할 수 없는 경우",
                    "부정청구자가 해당 부정이익을 자진하여 신고하고 환수한 경우"
                ],
                ans: 0,
                exp: "제재부가금 면제 기준액은 부정이익이 '10만원 이하'인 경우입니다."
            },
            {
                cat: "행동강령",
                q: "공무원 행동강령상 '가족 채용 제한'에 대한 설명 중 옳은 것은?",
                opts: [
                    "고위공직자는 소속 공공기관의 자회사에 자신의 가족이 채용되도록 지시할 수 없다.",
                    "인사 업무 담당 공무원은 자신이 소속된 기관에 가족이 채용되도록 영향력을 행사해서는 안 된다.",
                    "다수인을 대상으로 하는 공개경쟁채용시험을 통해 가족이 채용되는 것은 허용된다.",
                    "가족의 범위에는 민법상 가족뿐만 아니라 생계를 같이하는 배우자의 부모도 포함된다.",
                    "위의 설명은 모두 옳다."
                ],
                ans: 4,
                exp: "행동강령은 공정한 공개경쟁채용 과정을 통한 채용은 예외로 인정합니다."
            },
            {
                cat: "부패방지법",
                q: "부패방지권익위법상 비위면직자등의 취업제한 위반 시 처벌 수위로 옳은 것은?",
                opts: [
                    "1년 이하의 징역 또는 1천만원 이하의 벌금",
                    "2년 이하의 징역 또는 2천만원 이하의 벌금",
                    "3년 이하의 징역 또는 3천만원 이하의 벌금",
                    "5년 이하의 징역 또는 5천만원 이하의 벌금",
                    "과태료 3천만원 부과"
                ],
                ans: 1,
                exp: "비위면직자가 규정을 위반하여 취업한 경우 2년 이하의 징역 또는 2천만원 이하의 벌금에 처해집니다."
            }
        ];

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("인증 처리 중 오류 발생:", err);
            }
            
            onAuthStateChanged(auth, (user) => {
                window.state.user = user;
                if (user) {
                    const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                    onSnapshot(scoresRef, (snapshot) => {
                        window.state.leaderboard = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                            .sort((a, b) => b.score - a.score);
                        renderLeaderboard();
                    }, (err) => {
                        console.error("데이터 수신 오류 (권한 부족):", err);
                    });
                }
            });
        }

        window.startQuiz = () => {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("성함을 입력해주세요.");
            window.state.userName = name;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('quiz').classList.remove('hidden');
            showQuestion();
        };

        function showQuestion() {
            const q = questions[window.state.currentIndex];
            document.getElementById('q-cat').innerText = q.cat;
            document.getElementById('q-num').innerText = `${window.state.currentIndex + 1} / 10`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('progress').style.width = `${(window.state.currentIndex + 1) * 10}%`;
            
            const optionsBox = document.getElementById('options');
            optionsBox.innerHTML = q.opts.map((opt, i) => `
                <button onclick="checkAnswer(${i})" class="opt-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-indigo-600 transition-all font-medium flex items-center gap-3">
                    <span class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-xs font-bold text-gray-400 group-hover:bg-indigo-100 group-hover:text-indigo-600">${i+1}</span>
                    <span>${opt}</span>
                </button>
            `).join('');
            document.getElementById('exp-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        window.checkAnswer = (idx) => {
            const q = questions[window.state.currentIndex];
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.disabled = true);
            
            if (idx === q.ans) {
                window.state.score += 10;
                btns[idx].classList.add('bg-green-50', 'border-green-500', 'text-green-700');
            } else {
                btns[idx].classList.add('bg-red-50', 'border-red-500', 'text-red-700');
                btns[q.ans].classList.add('bg-green-50', 'border-green-500', 'text-green-700');
            }
            
            document.getElementById('exp-text').innerText = q.exp;
            document.getElementById('exp-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        };

        window.nextStep = async () => {
            if (window.state.currentIndex < 9) {
                window.state.currentIndex++;
                showQuestion();
            } else {
                await finishQuiz();
            }
        };

        async function finishQuiz() {
            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('final-score').innerText = window.state.score;
            
            if (window.state.user) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scores'), {
                        name: window.state.userName,
                        score: window.state.score,
                        uid: window.state.user.uid,
                        ts: serverTimestamp()
                    });
                } catch (e) {
                    console.error("데이터 저장 실패:", e);
                }
            }
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('board-body');
            const thDel = document.getElementById('th-del');
            if (!tbody) return;

            if (window.state.isAdmin) {
                thDel.classList.remove('hidden');
                document.getElementById('excel-btn').classList.remove('hidden');
                document.getElementById('admin-badge').classList.remove('hidden');
            }

            if (window.state.leaderboard.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">데이터를 불러오고 있습니다...</td></tr>`;
                return;
            }

            tbody.innerHTML = window.state.leaderboard.map((item, i) => `
                <tr class="border-b border-gray-50 hover:bg-slate-50 transition-colors">
                    <td class="p-3 text-center">
                        <span class="${i < 3 ? 'bg-indigo-600 text-white' : 'bg-gray-100 text-gray-400'} w-6 h-6 inline-flex items-center justify-center rounded-full text-[10px] font-black">
                            ${i+1}
                        </span>
                    </td>
                    <td class="p-3">
                        <div class="font-bold text-gray-700">${item.name || '무명'}</div>
                        <div class="text-[10px] text-gray-400">${item.ts ? new Date(item.ts.seconds * 1000).toLocaleDateString() : '최근'}</div>
                    </td>
                    <td class="p-3 text-right font-black text-indigo-600">${item.score}점</td>
                    ${window.state.isAdmin ? `
                        <td class="p-3 text-right">
                            <button onclick="deleteEntry('${item.id}')" class="bg-red-50 text-red-500 hover:bg-red-500 hover:text-white px-2 py-1 rounded text-[10px] font-bold transition-all">삭제</button>
                        </td>
                    ` : ''}
                </tr>
            `).join('');
        }

        window.deleteEntry = async (id) => {
            if (!window.state.isAdmin) return;
            if (confirm("이 기록을 삭제하시겠습니까?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scores', id));
                } catch (err) {
                    alert("삭제 권한이 없거나 오류가 발생했습니다.");
                }
            }
        };

        window.verifyAdmin = () => {
            const pw = prompt("관리자 인증 번호를 입력하세요.");
            if (pw === "2022284") {
                window.state.isAdmin = true;
                renderLeaderboard();
                alert("관리자 모드가 활성화되었습니다. 모든 성적을 관리할 수 있습니다.");
            } else if (pw !== null) {
                alert("잘못된 번호입니다.");
            }
        };

        window.downloadExcel = () => {
            if (!window.state.isAdmin) return;
            const data = window.state.leaderboard.map((item, i) => ({
                "순위": i + 1,
                "성함": item.name,
                "점수": item.score,
                "응시시간": item.ts ? new Date(item.ts.seconds * 1000).toLocaleString() : ""
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "성적표");
            XLSX.writeFile(wb, `경기북부지사_성적결과_${new Date().toISOString().slice(0,10)}.xlsx`);
        };

        window.onload = init;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center items-start">
    <div class="max-w-xl w-full glass-card rounded-[2.5rem] shadow-2xl overflow-hidden border border-white/20">
        <!-- Header -->
        <header class="bg-indigo-950 p-8 text-white relative">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-1">
                    <span class="text-xs font-bold text-indigo-300 tracking-tighter uppercase">Northern Gyeonggi Branch</span>
                    <span id="admin-badge" class="hidden bg-red-500 text-[10px] px-2 py-0.5 rounded font-black animate-pulse">ADMIN MODE</span>
                </div>
                <h1 class="text-2xl font-black leading-tight">2026 반부패 법령<br>초급 퀴즈 시스템</h1>
            </div>
            
            <button onclick="verifyAdmin()" class="absolute bottom-4 right-4 text-indigo-400 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </button>
        </header>

        <main class="p-8">
            <!-- Setup -->
            <section id="setup" class="py-12 text-center">
                <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-8 shadow-inner">👤</div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">교육생 본인 인증</h2>
                <p class="text-slate-400 text-sm mb-10">지사 내 성적 집계를 위해 실명을 입력해주세요.</p>
                <input type="text" id="user-name" class="w-full border-b-4 border-slate-100 p-4 mb-10 focus:border-indigo-600 outline-none text-center text-2xl font-black text-slate-700 transition-all placeholder:text-slate-200" placeholder="홍길동">
                <button onclick="startQuiz()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95">퀴즈 시작하기</button>
            </section>

            <!-- Quiz -->
            <section id="quiz" class="hidden">
                <div class="flex justify-between items-end mb-4">
                    <span id="q-cat" class="text-indigo-600 font-black text-xs uppercase bg-indigo-50 px-3 py-1 rounded-lg">CATEGORY</span>
                    <span id="q-num" class="text-slate-300 font-bold text-sm italic">01 / 10</span>
                </div>
                <div class="h-3 w-full bg-slate-100 rounded-full mb-10 overflow-hidden">
                    <div id="progress" class="h-full bg-indigo-600 transition-all duration-700" style="width: 0%"></div>
                </div>
                <h3 id="q-text" class="text-xl font-bold text-slate-800 mb-10 leading-relaxed min-h-[4rem]">질문을 불러오는 중...</h3>
                <div id="options" class="space-y-4 mb-10"></div>
                <div id="exp-box" class="hidden p-6 bg-slate-50 rounded-2xl border-l-4 border-indigo-600 mb-10 animate-fade-in">
                    <p id="exp-text" class="text-sm text-slate-600 leading-relaxed font-medium"></p>
                </div>
                <button id="next-btn" onclick="nextStep()" class="hidden w-full bg-slate-900 text-white font-black py-5 rounded-2xl hover:bg-black transition-all">다음 문항으로</button>
            </section>

            <!-- Result -->
            <section id="result" class="hidden animate-fade-in">
                <div class="text-center mb-12">
                    <div class="text-sm font-bold text-slate-400 mb-2 tracking-widest uppercase">Your Final Score</div>
                    <div class="text-8xl font-black text-indigo-600 tracking-tighter">
                        <span id="final-score">0</span><span class="text-2xl text-slate-300 ml-1">/ 100</span>
                    </div>
                </div>
                <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-xl shadow-slate-200/50">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-slate-800 flex items-center gap-2">
                            실시간 성적 랭킹
                            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        </h3>
                        <button id="excel-btn" onclick="downloadExcel()" class="hidden bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-xl text-[10px] font-black hover:bg-emerald-600 hover:text-white transition-all">EXCEL 추출</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead class="text-slate-400 font-black text-[10px] uppercase border-b border-slate-50">
                                <tr>
                                    <th class="p-3 w-10">RK</th>
                                    <th class="p-3 text-left">Name</th>
                                    <th class="p-3 text-right">Pts</th>
                                    <th id="th-del" class="p-3 text-right hidden">Manage</th>
                                </tr>
                            </thead>
                            <tbody id="board-body" class="font-medium"></tbody>
                        </table>
                    </div>
                </div>
                <button onclick="location.reload()" class="mt-12 w-full text-slate-400 font-bold text-sm underline underline-offset-8 hover:text-indigo-600 transition-colors">테스트 다시 시작하기</button>
            </section>
        </main>
